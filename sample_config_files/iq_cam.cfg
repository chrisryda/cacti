# Issue Queue (IQ) tag-CAM — MagnaOpus (gem5 non-super) calibration
#
# Models the WAKEUP HALF of the regular CAM-based IQ: the narrow array that
# holds source register tags and performs associative search every cycle when
# producers broadcast their destination tags on the result buses.
#
# The regular CAM IQ is a CAM+RAM hybrid:
#   - iq_cam.cfg          — this file — tag CAM (source tags, associative wakeup)
#   - iq_cam_payload.cfg  — payload SRAM (everything else, indexed read)
# Total regular-IQ energy = iq_cam.cfg energy + iq_cam_payload.cfg energy.
#
# Compare against the DIQ:
#   - diq_sram.cfg         — single 14 B SRAM (no CAM; alternative wakeup mechanism)
#
# Calibrated to the MagnaOpus CPU class (the user's default sim setup):
#   /home/crd/master/gem5/configs/sic_parvis_magna/sic_parvis.py:127-160
# The MagnaOpus class overrides BaseO3CPU defaults for ROB / LSQ / PRF
# sizes; for the tag CAM specifically only the PRF total matters, and it
# still rounds to a 10-bit tag (see derivation below). For SuperMagnaOpus
# (--super) deltas, see zontext/modeling-plan.md.
#
# Parameters swept by iq_cam_sweep.sh (values below are stand-alone defaults):
#   -size (bytes)           = IQ_ENTRIES * TAG_WIDTH_BYTES
#   -block size (bytes)     = TAG_WIDTH_BYTES  (one entry per block)
#   -read-write port        = dispatch width  (writes on uop entry)
#   -search port            = number of result broadcast buses
#   -output/input bus width = TAG_WIDTH_BYTES * 8  (in bits)
#   -technology (u)         = tech node in microns
#
# CAM bit accounting (MagnaOpus defaults):
#   - Total physical regs = 280 int + 224 fp + 256 vec + 32 vec-pred + 2 mat
#     = 794  →  PRF tag width = ceil(log2(794)) = 10 bits  per src
#     (int/fp from sic_parvis.py:144-145; vec/vec-pred/mat inherited from
#      BaseO3CPU.py defaults)
#   - 3 source operands per uop → 3 × 10 = 30 bits of CAM cells per entry
#   - Per-source ready bits are NOT in the CAM (they live in the payload and
#     gate the match-line output); the CAM cell array is exactly the tag bits.
#   - 30 bits rounded up to the nearest byte = 4 B per entry (2 bits of
#     byte-alignment slack). CACTI's -block size is byte-granular.
#
# Default size: 64 entries × 4 B = 256 B (sweep-script default). MagnaOpus
# itself ships with numIQEntries=120 (sic_parvis.py:138) and magna.py
# defaults --iq-size=120; the gem5 sweep covers {8..160} entries.
#
# Ports (MagnaOpus, sic_parvis.py:127-160):
#   RW ports     = dispatchWidth = 8        (inherited from BaseO3CPU;
#                                             MagnaOpus doesn't override it)
#   search ports = wbWidth       = 8        (sic_parvis.py:134 — one
#                                             broadcast bus per WB lane)
#
# Tech: CACTI floor is 22 nm; Ice Lake / Sunny-Cove-class is Intel 10 nm.
# Scale leakage and area analytically (~3×/~4× respectively).

# 64 entries × 4 B per entry  [overridden by iq_cam_sweep.sh]
-size (bytes) 256

# One CAM row = source-tag bundle for one entry (30 bits → 4 B)
-block size (bytes) 4

# CAM requires associativity 0
-associativity 0

# 8 dispatch write ports  [overridden by iq_cam_sweep.sh]
-read-write port 8
-exclusive read port 0
-exclusive write port 0
-single ended read ports 0

# 8 result-broadcast search ports (one per writeback lane)
-search port 8

-UCA bank count 1
# CACTI floor; Ice Lake is ~10 nm  [overridden by iq_cam_sweep.sh]
-technology (u) 0.022

# Page/burst params required by parser; not meaningful for on-chip CAM
-page size (bits) 8192
-burst length 8
-internal prefetch width 8

# High-performance SRAM cells. CAM requires same cell type for data and tag.
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"

# Bus width matches tag width in bits (4 B × 8)  [overridden by iq_cam_sweep.sh]
-output/input bus width 32

-operating temperature (K) 360

# CAM mode: associative search across all entries every cycle
-cache type "cam"
-tag size (b) "default"

# Fast access: search and read complete in one phase
-access mode (normal, sequential, fast) - "fast"

# Optimize for cycle time
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:100:0
-deviate (delay, dynamic power, leakage power, cycle time, area) 20:100000:100000:100000:100000

-NUCAdesign objective (weight delay, dynamic power, leakage power, cycle time, area) 100:100:0:0:100
-NUCAdeviate (delay, dynamic power, leakage power, cycle time, area) 10:10000:10000:10000:10000

-Optimize ED or ED^2 (ED, ED^2, NONE): "ED^2"
-Cache model (NUCA, UCA)  - "UCA"
-NUCA bank count 0

-Wire signaling (fullswing, lowswing, default) - "Global_30"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"

-Core count 8
-Cache level (L2/L3) - "L3"

# No ECC on microarchitectural structures
-Add ECC - "false"

-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "false"
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0

-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01

# IO parameters required by parser; not used for on-chip CAM results
-dram_type "DDR3"
-io state "WRITE"
-addr_timing 1.0
-mem_density 4 Gb
-bus_freq 800 MHz
-duty_cycle 1.0
-activity_dq 1.0
-activity_ca 0.5
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-rtt_value 10000
-ron_value 34
-tflight_value
