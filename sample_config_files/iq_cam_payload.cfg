# Issue Queue (IQ) payload SRAM — gem5 non-super calibration
#
# This is the PAYLOAD half of the regular CAM-based IQ (the other half is
# iq_cam.cfg, which holds the source-tag CAM). In a real CAM+RAM hybrid IQ:
#   - The CAM (iq_cam.cfg) holds source register tags and performs the
#     associative wakeup search every cycle.
#   - The SRAM here holds everything else — destination tag, opcode,
#     immediate, ROB/LSQ pointers, status, etc. — and is read out by entry
#     index when a uop is selected for issue.
#
# Total regular-IQ energy = iq_cam.cfg energy + iq_cam_payload.cfg energy
# Compare against: diq_sram.cfg energy (the DIQ — single 13 B SRAM, no CAM)
#
# Parameters swept by iq_cam_payload_sweep.sh:
#   -size (bytes)           = IQ_ENTRIES * PAYLOAD_WIDTH_BYTES
#   -block size (bytes)     = PAYLOAD_WIDTH_BYTES  (one entry per block)
#   -read-write port        = issue + dispatch bandwidth
#   -output/input bus width = PAYLOAD_WIDTH_BYTES * 8
#   -technology (u)         = tech node in microns
#
# Payload bit accounting (gem5 non-super defaults):
#   Field                                         Width
#   ---------------------------------------------------
#   3 × source ready bits                           3 b
#   1 × destination PRF tag (10-bit PRF index)     10 b
#   OpClass (77 op classes, op_class.hh)            7 b
#   FU port ID (25 FUs in DefaultFUPool)            5 b
#   ROB pointer (192-entry ROB)                     8 b
#   LSQ slot pointer (32-entry LQ or SQ)            5 b
#   Immediate (covers x86 32-b imm, ARM 26-b B)    32 b
#   Status: valid / issued / squashed               3 b
#   DIQ-consumer back-pointer (1 valid + 8 ptr)     9 b
#       (producer drives the DIQ ready-bit on
#        completion — the indexed-wakeup mechanism
#        that replaces the simulator-only
#        deltaWakeupMap. 8-b slot ptr covers DIQ up
#        to 150 entries, the gem5 sweep maximum.)
#   ---------------------------------------------------
#   TOTAL                                          82 b → 11 B
#
# Field-width sources: BaseO3CPU.py:143-190, cpu/op_class.hh (Num_OpClass=77),
# cpu/o3/FuncUnitConfig.py (25 FUs in DefaultFUPool).
#
# What we do NOT model in this entry (called out so future readers don't
# add them back):
#   - Per-source CAM tag bits — those live in iq_cam.cfg, not here.
#   - gem5's 64-bit InstSeqNum — simulator ordering token; real hardware
#     uses the ROB pointer.
#   - The 20-bit gem5 status bitset (dyn_inst.hh:158-188) — bits 4..19
#     are iterator handles, trace flags, RegsRenamed, etc. (simulator state).
#   - StaticInst byte stream — re-fetched from icache on misprediction; not
#     replicated per IQ entry in real hardware.
#
# Default size: 64 entries × 11 B = 704 B (matches gem5 numIQEntries=64).
#
# Ports (gem5 non-super, BaseO3CPU.py:122-124):
#   RW ports = max(dispatchWidth, issueWidth) = 8
#   Each RW port serves one of: issue read OR dispatch write OR wb update
#   per cycle. CACTI's RW port is bidirectional; 8 covers a 8-wide pipeline.
#
# Tech: CACTI floor 22 nm; Ice Lake / Sunny-Cove-class is Intel 10 nm.

# 64 entries × 11 B per entry  [overridden by iq_cam_payload_sweep.sh]
-size (bytes) 704

# One SRAM row = one IQ entry's non-tag payload (81 bits → 11 B)
-block size (bytes) 11

# Direct-mapped: payload accessed by entry slot index
-associativity 1

# 8 R/W ports for issue read + dispatch write + WB update
-read-write port 8
-exclusive read port 0
-exclusive write port 0
-single ended read ports 0

-UCA bank count 1
# CACTI floor; Ice Lake is ~10 nm  [overridden by iq_cam_payload_sweep.sh]
-technology (u) 0.022

# Page/burst params required by parser; not meaningful for on-chip SRAM
-page size (bits) 8192
-burst length 8
-internal prefetch width 8

# High-performance SRAM cells (no low-power or DRAM cells)
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"

# Bus width matches payload width in bits (11 B × 8)
-output/input bus width 88

-operating temperature (K) 360

# RAM mode: no tag array, no cache-line lookup — indexed register-file semantics
-cache type "ram"
-tag size (b) "default"

# Fast access: no tag check latency
-access mode (normal, sequential, fast) - "fast"

# Optimize for cycle time
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:100:0
-deviate (delay, dynamic power, leakage power, cycle time, area) 20:100000:100000:100000:100000

-NUCAdesign objective (weight delay, dynamic power, leakage power, cycle time, area) 100:100:0:0:100
-NUCAdeviate (delay, dynamic power, leakage power, cycle time, area) 10:10000:10000:10000:10000

-Optimize ED or ED^2 (ED, ED^2, NONE): "ED^2"
-Cache model (NUCA, UCA)  - "UCA"
-NUCA bank count 0

-Wire signaling (fullswing, lowswing, default) - "Global_30"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"

-Core count 8
-Cache level (L2/L3) - "L3"

# No ECC on microarchitectural structures
-Add ECC - "false"

-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "false"
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0

-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01

# IO parameters required by parser; not used for on-chip SRAM results
-dram_type "DDR3"
-io state "WRITE"
-addr_timing 1.0
-mem_density 4 Gb
-bus_freq 800 MHz
-duty_cycle 1.0
-activity_dq 1.0
-activity_ca 0.5
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-rtt_value 10000
-ron_value 34
-tflight_value
