# Delta IQ (DIQ) SRAM array model — gem5 non-super calibration
#
# Models the storage array of the DIQ: a SECONDARY side queue that runs
# alongside the regular CAM-based IQ. Holds delta-candidate instructions
# (exactly one unready source, producer completing in < 2 cycles).
#
# Wakeup is by DIRECT INDEXING — when the producer's IQ entry completes, it
# writes the ready bit of its delta consumer's DIQ slot directly (the
# producer's IQ entry carries a small pointer to that DIQ slot — modeled in
# iq_cam_payload.cfg as +8 bits per IQ entry). No associative search. The
# gem5 unordered_map<seqNum, DynInstPtr> at inst_queue.hh:426 is a simulator
# convenience; the hardware intent is the indexed write.
#
# IMPORTANT: the DIQ holds memory operations. Verified at:
#   - inst_queue.cc:599-704 (insert()): no !isMemRef() guard
#   - iew.cc:937-949 (dispatchInsts): delta candidates bypass full IQ into
#     DIQ regardless of isMemRef()
#   - inst_queue.cc:1216-1230: mem delta insts stay in deltaInstList past
#     wakeup until commit/squash
# (res-goals.md claims memory ops are excluded; that claim is wrong.)
# Consequence: the DIQ entry carries an LSQ slot pointer just like the
# regular IQ payload.
#
# Compare against the regular CAM IQ model: iq_cam.cfg + iq_cam_payload.cfg.
# Research goal: shift entries from CAM IQ to indexed DIQ (e.g. 64/0 → 50/14)
# and measure total energy/area savings via design_point_sweep.sh.
#
# Parameters swept by diq_sram_sweep.sh (values below are stand-alone defaults):
#   -size (bytes)           = DIQ_ENTRIES * DIQ_ENTRY_WIDTH_BYTES
#   -block size (bytes)     = DIQ_ENTRY_WIDTH_BYTES  (one entry per block)
#   -read-write port        = side-queue dispatch+issue traffic (default 4)
#   -output/input bus width = DIQ_ENTRY_WIDTH_BYTES * 8  (in bits)
#   -technology (u)         = tech node in microns
#
# DIQ entry bit accounting (gem5 non-super defaults):
#   Field                                         Width
#   ---------------------------------------------------
#   3 × source PRF tag (plain SRAM, not CAM)       30 b
#       (still stored — read at issue to drive
#        PRF reads — but never associatively
#        compared against a broadcast bus)
#   3 × source ready bits                           3 b
#       (the delta source's bit is what gets
#        flipped on indexed wakeup)
#   1 × destination PRF tag                        10 b
#   OpClass (77 op classes)                         7 b
#   FU port ID (25 FUs)                             5 b
#   ROB pointer (192-entry ROB)                     8 b
#   LSQ slot pointer (32-entry LQ or SQ)            5 b   ← DIQ holds mem ops
#   Immediate (32 b for x86 / ARM-safe)            32 b
#   Status: valid / issued / squashed               3 b
#   ---------------------------------------------------
#   TOTAL                                         103 b → 13 B
#
# What is NOT in the DIQ entry:
#   - CAM tag cells — wakeup is indexed, not associative
#   - Producer back-pointer — lives on the *producer's* IQ payload entry,
#     not on the consumer's DIQ entry
#   - gem5's per-source `deltaVec` (dyn_inst.hh:101-106) and 64-bit
#     `deltaProdSeqNum` — simulator metadata used at the rename-stage
#     isDeltaCand() check, never reaches the DIQ
#
# The DIQ's savings vs the regular IQ come from cell type (SRAM not CAM),
# port count (4 not 8+8), and the lack of match-line logic — NOT from
# storing fewer logical bits. The DIQ entry IS slightly narrower than the
# combined IQ entry (13 B vs 4+11 = 15 B) because it omits the
# producer-side DIQ back-pointer.
#
# Default ports = 4 RW. The DIQ is a SECONDARY queue: it sees only the
# delta-candidate fraction of dispatch (~2 writes/cycle peak) and the woken
# fraction of issue (~2 reads/cycle peak). Wakeup writes (single ready-bit
# flips) are lumped here too; the design_point_sweep.sh CSV carries a
# separate diq_wakeup_e_nJ column approximating them as 1/N of a row write.
# Pipeline-width port counts (8+) would over-state peripheral cost.
#
# Default size: 14 entries × 13 B = 182 B (matches gem5
# numDeltaIQEntries=14, BaseO3CPU.py:189). Sweeps cover {8..160} entries.
#
# Tech: CACTI floor 22 nm; Ice Lake / Sunny-Cove-class is Intel 10 nm.

# 14 entries × 13 B per entry  [overridden by diq_sram_sweep.sh]
-size (bytes) 182

# One SRAM row = one DIQ entry (103 bits → 13 B)
-block size (bytes) 13

# Direct-mapped: entries are indexed by slot number, no tag comparison
-associativity 1

# Side-queue traffic, not pipeline-width  [overridden by diq_sram_sweep.sh]
-read-write port 4
-exclusive read port 0
-exclusive write port 0
-single ended read ports 0

-UCA bank count 1
# CACTI floor; Ice Lake is ~10 nm  [overridden by diq_sram_sweep.sh]
-technology (u) 0.022

# Page/burst params required by parser; not meaningful for on-chip SRAM
-page size (bits) 8192
-burst length 8
-internal prefetch width 8

# High-performance SRAM cells (no low-power or DRAM cells)
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"

# Bus width matches entry width in bits (13 B × 8)
-output/input bus width 104

-operating temperature (K) 360

# RAM mode: no tag array, no cache-line lookup — pure register-file semantics
-cache type "ram"
-tag size (b) "default"

# Fast access: no tag check latency
-access mode (normal, sequential, fast) - "fast"

# Optimize for cycle time (weight: delay=0, dyn_power=0, leak=0, cycle=100, area=0)
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:100:0
-deviate (delay, dynamic power, leakage power, cycle time, area) 20:100000:100000:100000:100000

-NUCAdesign objective (weight delay, dynamic power, leakage power, cycle time, area) 100:100:0:0:100
-NUCAdeviate (delay, dynamic power, leakage power, cycle time, area) 10:10000:10000:10000:10000

-Optimize ED or ED^2 (ED, ED^2, NONE): "ED^2"
-Cache model (NUCA, UCA)  - "UCA"
-NUCA bank count 0

-Wire signaling (fullswing, lowswing, default) - "Global_30"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"

-Core count 8
-Cache level (L2/L3) - "L3"

# No ECC on microarchitectural structures
-Add ECC - "false"

-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "false"
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0

-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01

# IO parameters required by parser; not used for on-chip SRAM results
-dram_type "DDR3"
-io state "WRITE"
-addr_timing 1.0
-mem_density 4 Gb
-bus_freq 800 MHz
-duty_cycle 1.0
-activity_dq 1.0
-activity_ca 0.5
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-rtt_value 10000
-ron_value 34
-tflight_value
